{% extends 'base.html' %}

{% block content %}
  <h2>Sign In</h2>

  {% if form.errors %}
    <p style="color:red;">Invalid username or password.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Sign In</button>
  </form>

  <p>
    Don't have an account?
    <a href="{% url 'register' %}">Sign up now!</a>
 
  </p>
{% endblock %}
